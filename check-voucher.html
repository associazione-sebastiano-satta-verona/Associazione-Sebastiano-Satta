<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><link rel="icon" type="image/png" href="logo-compressed.png"><title>Controllo Voucher - Associazione Sardi Sebastiano Satta di Verona</title><meta name="description" content="Genera o verifica un voucher dell'Associazione dei Sardi 'Sebastiano Satta' di Verona."><meta name="robots" content="noindex, nofollow"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px;text-align:center}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.server-status{width:calc(100% - 40px);margin:12px auto 0 auto;padding:18px;background:#ffffff;color:black;font-size:20px;font-weight:900;text-align:center;display:none;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15)}.contenuto{max-width:600px;margin:auto;padding:20px}h1{font-size:30px;margin-bottom:20px}h2{font-size:24px;margin-top:35px}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}.select-box{margin-top:15px;width:90%;max-width:300px;padding:12px;font-size:18px;border-radius:10px;border:2px solid #d40000;background:#fff}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,0.25);animation:fadeIn .25s ease;text-align:center;font-size:18px;word-wrap:break-word;overflow-wrap:break-word}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}.popup-link{color:#0044ff;text-decoration:none;font-weight:700;transition:.2s;display:block;margin:10px 0;word-wrap:break-word;overflow-wrap:break-word}.popup-link:hover{color:#d40000;text-decoration:underline}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}#video{width:100%;margin-top:20px;display:none;border-radius:12px}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Controllo Voucher</h1><h2>Genera Voucher</h2><select id="valore" class="select-box"><option value="">Seleziona valore</option><option value="10€">10€</option><option value="20€">20€</option><option value="30€">30€</option><option value="40€">40€</option><option value="50€">50€</option><option value="10%">10%</option><option value="20%">20%</option><option value="30%">30%</option><option value="40%">40%</option><option value="50%">50%</option></select><button class="btn-main" id="btn-genera">Crea voucher</button><h2>Verifica tramite QR-Code</h2><button type="button" class="btn-main" id="btn-scan">Scansiona QR-Code</button><video id="video" playsinline></video></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script type="module">import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";document.getElementById("logo-home").onclick = () => { window.location.href = "index.html";};window.addEventListener("scroll", () => { const h = document.querySelector(".header"); window.scrollY > 10 ? h.classList.add("scrolled") : h.classList.remove("scrolled");});function popupMsg(t){ document.getElementById("popup-msg-text").innerHTML = t; document.getElementById("popup-msg-bg").style.display = "flex";}document.getElementById("popup-msg-ok").onclick = () => { document.getElementById("popup-msg-bg").style.display = "none";};let scanner = null;let lastScan = 0;document.getElementById("btn-genera").onclick = async () => { const params = new URLSearchParams(window.location.search); const key = params.get("key"); if (!key) return popupMsg("Chiave mancante."); const valore = document.getElementById("valore").value; if (!valore) return popupMsg("Seleziona un valore."); document.getElementById("btn-genera").disabled = true; const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/create-voucher", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key, valore }) }); if (!res.ok) { const text = await res.text(); popupMsg(text); document.getElementById("btn-genera").disabled = false; return; } const data = await res.json(); const link = "https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/voucher.html?token=" + encodeURIComponent(data.codice); popupMsg( "Voucher creato:<br><br>" + "<strong>Valore: " + data.valore + "</strong><br><br>" + "<a href='" + link + "' target='_blank' class='popup-link'>" + link + "</a>" + "<button id='copy-btn' style='padding:10px 15px;border:none;border-radius:8px;background:#d40000;color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;'>Copia link</button>" ); setTimeout(() => { const btn = document.getElementById("copy-btn"); if (btn) { btn.onclick = () => { navigator.clipboard.writeText(link); btn.innerHTML = "Copiato!"; setTimeout(() => btn.innerHTML = "Copia link", 1500); }; } }, 50); document.getElementById("btn-genera").disabled = false;};document.getElementById("btn-scan").onclick = async () => { const params = new URLSearchParams(window.location.search); const key = params.get("key"); if (!key) return popupMsg("Chiave mancante."); const video = document.getElementById("video"); video.style.display = "block"; if (!scanner) { scanner = new QrScanner(video, async result => { const now = Date.now(); if (now - lastScan < 10000) return; lastScan = now; const codice = result.data.trim(); if (codice.length !== 128) return popupMsg("QR non valido."); const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-voucher", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ codice, key }) }); let text = await res.text(); try { const json = JSON.parse(text); if (json.valore) { text = json.status + "<br><br><strong>Valore: " + json.valore + "</strong>"; } } catch {} popupMsg(text); }, { highlightScanRegion: true, highlightCodeOutline: true }); } await scanner.start();};async function checkServerStatus(){ const banner = document.getElementById("server-status"); try { const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if (!res.ok) { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; return; } const data = await res.json(); if (data.status === "maintenance") { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; } } catch { banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; }}checkServerStatus();</script></body></html>
