x;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,0.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}.popup-link{color:#0044ff;text-decoration:none;font-weight:700;display:block;margin:10px 0;overflow-wrap:anywhere}.popup-link:hover{color:#d40000;text-decoration:underline}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}#video{width:100%;margin-top:20px;display:none;border-radius:12px}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Controllo Voucher</h1><h2>Genera Voucher</h2><div class="radio-group" id="radio-valori"><div class="radio-box" data-value="10€"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>10€</div></div><div class="radio-box" data-value="20€"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>20€</div></div><div class="radio-box" data-value="30€"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>30€</div></div><div class="radio-box" data-value="40€"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>40€</div></div><div c ment.getElementById("btn-genera").onclick=async()=>{const params=new URLSearchParams(window.location.search);const key=params.get("key");if(!key)return popupMsg("Chiave mancante.");const valore=selectedValue;if(!valore)return popupMsg("Seleziona un valore.");document.getElementById("btn-genera").disabled=true;const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/create-voucher",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,valore})});if(!res.ok){const text=await res.text();popupMsg(text);document.getElementById("btn-genera").disabled=false;return}const data=await res.json();const link="https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/voucher.html?token="+encodeURIComponent(data.codice);popupMsg("Voucher creato:<br><br>"+"<strong>Valore: "+data.valore+"</strong><br><br>"+"<a href='"+link+"' target='_blank' class='popup-link'>"+link+"</a>"+"<button id='copy-btn' style='padding:10px 15px;border:none;border-radius:8px;background:#d40000;color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;'>Copia link</button>");setTimeout(()=>{const btn=document.getElementById("copy-btn");if(btn){btn.onclick=()=>{navigator.clipboard.writeText(link);btn.innerHTML="Copiato!";setTimeout(()=>btn.innerHTML="Copia link",1500)}}},50);document.getElementById("btn-genera").disabled=false};document.getElementById("btn-scan").onclick=async()=>{const params=new URLSearchParams(window.location.search);const key=params.get("key");if(!key)return popupMsg("Chiave mancante.");const video=document.getElementById("video");video.style.display="block";if(!scanner){scanner=new QrScanner(video,async result=>{const now=Date.now();if(now-lastScan<10000)return;lastScan=now;const codice=result.data.trim();if(codice.length!==128)return popupMsg("QR non valido.");const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-voucher",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({codice,key})});let text=await res.text();try{const json=JSON.parse(text);if(json.valore){text=json.status+"<br><br><strong>Valore: "+json.valore+"</strong>"}}catch(e){}popupMsg(text)},{highlightScanRegion:true,highlightCodeOutline:true})}await scanner.start()};async function checkServerStatus() { const banner = document.getElementById("server-status"); let timeoutReached = false; const timeout = setTimeout(() => { timeoutReached = true; banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; }, 5000); try { const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if (timeoutReached) return; clearTimeout(timeout); if (!res.ok) { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; return; } const data = await res.json(); if (data.status === "maintenance") { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; } } catch (e) { if (!timeoutReached) { clearTimeout(timeout); banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; } }}; checkServerStatus()</script></body></html>
