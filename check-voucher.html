n-bottom:20px}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,0.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}.popup-link{color:#0044ff;text-decoration:none;font-weight:700;transition:.2s}.popup-link:hover{color:#d40000;text-decoration:underline}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}#video{width:100%;margin-top:20px;display:none;border-radius:12px}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Controllo Voucher</h1><h2>Genera Voucher</h2><button class="btn-main" id="btn-genera">Crea voucher</button><h2 style="margin-top:50px">Verifica tramite QR-Code</h2><button type="button" class="btn-main" id="btn-scan">Scansiona QR-Code</button><video id="video" playsinline></video></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script type="module">import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";document.getElementById("logo-home").onclick = () => { window.location.href = "index.html";};window.addEventListener("scroll", () => { const h = document.querySelector(".header"); window.scrollY > 10 ? h.classList.add("scrolled") : h.classList.remove("scrolled");});function popupMsg(t){ document.getElementById("popup-msg-text").innerHTML = t; document.getElementById("popup-msg-bg").style.display = "flex";}document.getElementById("popup-msg-ok").onclick = () => { document.getElementById("popup-msg-bg").style.display = "none";};document.getElementById("btn-genera").onclick = async () => { const params = new URLSearchParams(window.location.search); const key = params.get("key"); if (!key) return popupMsg("Chiave mancante."); document.getElementById("btn-genera").disabled = true; const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/create-voucher", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key }) }); if (res.status !== 200) { popupMsg(await res.text()); document.getElementById("btn-genera").disabled = false; return; } const data = await res.json(); const link = "https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/voucher.html?token=" + encodeURIComponent(data.codice); popupMsg( "Voucher creato:<br><br>" + "<a href='" + link + "' target='_blank' class='popup-link'>" + link + "</a>" + "<br><br><button id='copy-btn' style='padding:10px 15px;border:none;border-radius:8px;background:#d40000;color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:100%;'>Copia link</button>" ); setTimeout(() => { const btn = document.getElementById("copy-btn"); if (btn) { btn.onclick = () => { navigator.clipboard.writeText(link); btn.innerText = "Copiato!"; setTimeout(() => btn.innerText = "Copia link", 1500); }; } }, 50); document.getElementById("btn-genera").disabled = false;};let scanner = null;let lastScan = 0;document.getElementById("btn-scan").onclick = async () => { const params = new URLSearchParams(window.location.search); const key = params.get("key"); if (!key) return popupMsg("Chiave mancante."); const video = document.getElementById("video"); video.style.display = "block"; if (!scanner) { scanner = new QrScanner(video, async result => { const now = Date.now(); if (now - lastScan < 10000) return; lastScan = now; const codice = result.data.trim(); if (codice.length !== 128) return popupMsg("QR non valido."); const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-voucher", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ codice, key }) }); popupMsg(await res.text()); }, { highlightScanRegion: true, highlightCodeOutline: true }); } await scanner.start();};async function checkServerStatus(){ const banner = document.getElementById("server-status"); try { const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if (!res.ok) { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; return; } const data = await res.json(); if (data.status === "maintenance") { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; } } catch { banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; }}checkServerStatus();</script><noscript><style>body{margin:0;padding:0;overflow:hidden!important}#noscript-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(90deg,#d40000,#0044ff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;text-align:center;color:#fff;font-family:Arial,sans-serif;z-index:999999}#noscript-overlay img{width:120px;height:120px;border-radius:35%;margin-bottom:25px;box-shadow:0 4px 14px rgba(0,0,0,0.25)}#noscript-overlay h1{font-size:26px;font-weight:800;margin-bottom:15px}#noscript-overlay p{font-size:18px;line-height:1.5;max-
