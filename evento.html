YmRxeXJkcXN4b2lwcGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2ODg4NDYsImV4cCI6MjA4NTI2NDg0Nn0.uQxL5bWSFTymZYs-r3ZCWNc7wDPsA-bt0G9lSpfhFpI";const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);const params=new URLSearchParams(window.location.search);const id=params.get("id");function startLoadingBar(){ const c=document.getElementById("loading-bar-container"); const b=document.getElementById("loading-bar"); c.style.display="block"; let p=0; const i=setInterval(()=>{p+=10;b.style.width=p+"%";if(p>=90)clearInterval(i);},200); return()=>{b.style.width="100%";setTimeout(()=>c.style.display="none",300);}}async function caricaEvento(){ const stop=startLoadingBar(); const{data}=await supabaseClient.from("eventi").select("*").eq("id",id).single(); stop(); if(!data){ document.querySelector(".contenuto").innerHTML=`<div style="text-align:center;padding:40px;font-size:22px;color:#666;">Evento non trovato.</div>`; return; } document.getElementById("titolo").textContent=data.titolo; document.getElementById("data").textContent=data.data; document.getElementById("orari").textContent=data.orari; document.getElementById("immagine").src=data.immagine||"placeholder.jpg"; document.getElementById("testo").innerHTML=data.descrizione; const btn=document.getElementById("addCalendarBtn"); const rawDate=data.data||""; const dateClean=rawDate.replace(/-/g,""); let startTime=null; let endTime=null; if(data.orari){ const m=data.orari.match(/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/); if(m){ let [h1,m1]=m[1].split(":"); let [h2,m2]=m[2].split(":"); h1=h1.padStart(2,"0"); m1=m1.padStart(2,"0"); h2=h2.padStart(2,"0"); m2=m2.padStart(2,"0"); startTime=`${h1}${m1}00`; endTime=`${h2}${m2}00`; } } let datesParam=""; if(startTime && endTime){ datesParam=`${dateClean}T${startTime}/${dateClean}T${endTime}`; }else{ datesParam=`${dateClean}/${dateClean}`; } const temp=document.createElement("div"); temp.innerHTML=data.descrizione||""; const plain=temp.textContent||temp.innerText||""; const url="https://calendar.google.com/calendar/render?action=TEMPLATE" +"&text="+encodeURIComponent(data.titolo) +"&details="+encodeURIComponent(plain) +"&dates="+encodeURIComponent(datesParam); btn.style.display="flex"; btn.onclick=()=>window.open(url,"_blank");}caricaEvento();document.getElementById("shareBtn").addEventListener("click",async()=>{ const url=window.location.href; const title=document.getElementById("titolo").textContent||document.title; if(navigator.share){ try{await navigator.share({title:title,text:"Guarda questo evento:",url:url});}catch(e){} }else{ navigator.clipboard.writeText(url); alert("Link copiato negli appunti!"); }});window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});document.getElementById("logo-home").addEventListener("click",()=>{window.location.href="index.html";});let currentImgSrc="";let blurred=false;const img=document.getElementById("immagine");const btnImg=document.getElementById("img-button");img.addEventListener("click",()=>{ if(!blurred){ currentImgSrc=img.src; img.style.filter="blur(12px) brightness(1.2)"; btnImg.style.display="block"; blurred=true; }else{ img.style.filter="none"; btnImg.style.display="none"; blurred=false; }});btnImg.addEventListener("click",()=>{if(currentImgSrc) window.open(currentImgSrc,"_blank");});</script></body></html>
