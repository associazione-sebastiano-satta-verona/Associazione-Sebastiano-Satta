<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><link rel="icon" type="image/png" href="logo-compressed.png"><title>Modulo Privacy - Associazione Sardi Sebastiano Satta di Verona</title><meta name="robots" content="noindex, nofollow"><script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:.3s}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;white-space:normal;word-break:break-word;line-height:1.2;max-width:80%}.server-status{width:calc(100% - 40px);margin:12px auto 0 auto;padding:18px;background:#ffffff;color:black;font-size:20px;font-weight:900;text-align:center;display:none;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15)}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd}.telefono-wrapper{display:flex;align-items:center}.prefisso{padding:14px;font-size:17px;background:#ccc;border-radius:10px 0 0 10px;border:2px solid #ddd;border-right:none;font-weight:700;color:#333}.telefono-wrapper input{border-radius:0 10px 10px 0;border-left:none;flex:1}.radio-box{background:#fafafa;border:2px solid #ddd;border-radius:10px;padding:14px;display:flex;align-items:center;cursor:pointer;transition:.2s;margin-bottom:12px}.radio-box:hover{background:#f0f0f0}.radio-box.selected{border:2px solid #0044ff;background:#eef3ff}.radio-circle{width:22px;height:22px;border-radius:50%;border:3px solid #0044ff;margin-right:14px;display:flex;align-items:center;justify-content:center}.radio-circle-inner{width:10px;height:10px;border-radius:50%;background:#0044ff;display:none}.radio-box.selected .radio-circle-inner{display:block}.btn-main{margin:25px auto 0 auto;background:#ccc;color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:not-allowed}.popup-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999}.popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease}.popup h2{text-align:center;margin-bottom:15px;font-size:24px}.popup p{font-size:17px;margin:6px 0;color:#333}.popup-buttons{display:flex;gap:12px;margin-top:20px}.popup-buttons button{flex:1;padding:12px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer}.btn-cancel{background:#ccc}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}.hp{display:none!important}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Modulo Privacy</h1><form id="form"><input type="text" class="hp" id="hp"><input type="text" class="hp" id="hp2"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div class="telefono-wrapper"><div class="prefisso">+39</div><input type="text" id="telefono" placeholder="Telefono" required></div><input type="email" id="email" placeholder="Email" required><div id="radio-container"><div class="radio-box" data-value="richiesta_privacy"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>Informazioni sul trattamento dati</div></div><div class="radio-box" data-value="richiesta_cancellazione"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>Richiesta cancellazione dati</div></div><div class="radio-box" data-value="richiesta_rettifica"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>Richiesta rettifica dati</div></div><div class="radio-box" data-value="richiesta_accesso_dati"><div class="radio-circle"><div class="radio-circle-inner"></div></div><div>Richiesta accesso ai dati</div></div></div><div class="cf-turnstile" data-sitekey="0x4AAAAAADlMR87Vy9p9-x7c" data-size="invisible" data-callback="onTurnstileSuccess"></div><button type="button" class="btn-main" id="btn-submit" onclick="triggerTurnstile()">Invia Richiesta</button></form></div><div class="popup-bg" id="popup-bg"><div class="popup"><h2>Conferma Richiesta</h2><p id="p-nome"></p><p id="p-cognome"></p><p id="p-telefono"></p><p id="p-email"></p><p id="p-messaggio"></p><div class="popup-buttons"><button class="btn-cancel" id="annulla">Annulla</button><button class="btn-confirm" id="conferma">Conferma</button></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>document.getElementById("logo-home").onclick=()=>location.href="index.html";window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>document.getElementById("popup-msg-bg").style.display="none";let selected=null;document.querySelectorAll(".radio-box").forEach(box=>{box.onclick=()=>{document.querySelectorAll(".radio-box").forEach(b=>b.classList.remove("selected"));box.classList.add("selected");selected=box.dataset.value;};});document.addEventListener("click",(e)=>{const isRadio=e.target.closest(".radio-box");if(!isRadio){document.querySelectorAll(".radio-box").forEach(b=>b.classList.remove("selected"));if(selected){const chosen=document.querySelector(`.radio-box[data-value="${selected}"]`);if(chosen)chosen.classList.add("selected");}}});document.getElementById("telefono").addEventListener("input",(e)=>{e.target.value=e.target.value.replace(/\+/g,"");});document.getElementById("form").onsubmit=e=>e.preventDefault();function triggerTurnstile(){document.getElementById("btn-submit").style.background="#ccc";document.getElementById("btn-submit").style.cursor="not-allowed";turnstile.execute();}function onTurnstileSuccess(token){window.turnstileToken=token;document.getElementById("btn-submit").style.background="linear-gradient(90deg,#d40000,#0044ff)";document.getElementById("btn-submit").style.cursor="pointer";submitRichiesta();}async function submitRichiesta(){if(document.getElementById("hp").value!=""||document.getElementById("hp2").value!="")return;const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();const telefono=document.getElementById("telefono").value.trim();const email=document.getElementById("email").value.trim();if(nome.length<2)return popupMsg("Nome non valido");if(cognome.length<2)return popupMsg("Cognome non valido");if(telefono.length<6)return popupMsg("Telefono non valido");if(!email.includes("@")||!email.includes("."))return popupMsg("Email non valida");if(!selected)return popupMsg("Seleziona una richiesta");const payload={nome,cognome,telefono:"+39"+telefono,email,messaggio:selected,turnstile_token:window.turnstileToken};const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/richieste-privacy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const text=await res.text();if(text==="OK")return popupMsg("Richiesta inviata correttamente");return popupMsg(text);}</script><script>async function checkServerStatus(){const banner=document.getElementById("server-status");try{const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione");if(!res.ok){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";return;}const data=await res.json();if(data.status==="maintenance"){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";}}catch(e){banner.textContent="⚠️ Impossibile contattare il server";banner.style.display="block";}}checkServerStatus();</script><script>(function(){const ref=document.referrer;let source="direct";if(ref.includes("google."))source="google";else if(ref.includes("facebook.")||ref.includes("fb."))source="facebook";else if(ref.includes("instagram."))source="instagram";else if(ref.includes("tiktok."))source="tiktok";else if(ref.includes("whatsapp."))source="whatsapp";else if(ref.includes("canva."))source="canva";else if(ref)source=new URL(ref).hostname.replace("www.","");fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/utm-tracker",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({utm_source:source})});})();</script><noscript><style>body{margin:0;padding:0;overflow:hidden!important}#noscript-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(90deg,#d40000,#0044ff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;text-align:center;color:#fff;font-family:Arial,sans-serif;z-index:999999}#noscript-overlay img{width:120px;height:120px;border-radius:35%;margin-bottom:25px;box-shadow:0 4px 14px rgba(0,0,0,0.25)}#noscript-overlay h1{font-size:26px;font-weight:800;margin-bottom:15px}#noscript-overlay p{font-size:18px;line-height:1.5;max-width:500px}</style><div id="noscript-overlay"><img src="logo.png" alt="Logo Associazione Sardi Sebastiano Satta di Verona"><h1>JavaScript necessario</h1><p>Il sito dell'Associazione Sardi "Sebastiano Satta" di Verona ha bisogno di JavaScript abilitato sul dispositivo per funzionare correttamente.<br><br>Per favore, abilitalo nelle impostazioni del browser e ricarica la pagina.</p></div></noscript></body></html>
