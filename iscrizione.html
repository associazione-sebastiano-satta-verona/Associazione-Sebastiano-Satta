<!DOCTYPE html><html lang="it"><head><meta name="theme-color" content="#d40000"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Iscrizione Evento</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.phone-wrapper{display:flex;gap:10px}.phone-prefix{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;background:#eee;width:90px;text-align:center;pointer-events:none;user-select:none}.phone-input{flex:1}.btn-main{ margin:25px auto 0 auto; background:linear-gradient(90deg,#d40000,#0044ff); color:#fff; border:none; border-radius:10px; padding:14px 22px; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 12px rgba(0,0,0,.15); transition:transform .2s,opacity .2s;}.btn-main:hover{transform:translateY(-2px);opacity:.9}#msg{margin-top:25px;text-align:center;font-size:18px;font-weight:600}#msg.ok{color:#0a8a0a}#msg.err{color:#d40000}.loading{opacity:.6;pointer-events:none}.popup-bg{ position:fixed;top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,.55); display:none;align-items:center;justify-content:center; z-index:9999;}.popup{ background:#fff;border-radius:14px;padding:25px; width:90%;max-width:420px; box-shadow:0 6px 20px rgba(0,0,0,.25); animation:fadeIn .25s ease;}.popup h2{text-align:center;margin-bottom:15px;font-size:24px}.popup p{font-size:17px;margin:6px 0;color:#333}.popup-buttons{display:flex;gap:12px;margin-top:20px}.popup-buttons button{ flex:1;padding:12px;border:none;border-radius:10px; font-size:17px;font-weight:700;cursor:pointer;}.btn-cancel{background:#ccc}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><input type="email" id="email" placeholder="Email" required><div class="phone-wrapper"><div class="phone-prefix">+39</div><input type="tel" id="telefono" class="phone-input" placeholder="Telefono" required></div><button type="submit" class="btn-main">Invia Iscrizione</button></form><div id="msg"></div></div><div class="popup-bg" id="popup-bg"><div class="popup"><h2>Conferma Iscrizione</h2><p id="p-nome"></p><p id="p-cognome"></p><p id="p-email"></p><p id="p-telefono"></p><div class="popup-buttons"><button class="btn-cancel" id="annulla">Annulla</button><button class="btn-confirm" id="conferma">Conferma</button></div></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});document.getElementById("telefono").addEventListener("input",()=>{ const t=document.getElementById("telefono"); t.value=t.value.replace(/[^0-9]/g,"");});let cacheDati=null;document.getElementById("form").addEventListener("submit",(e)=>{ e.preventDefault(); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const email=document.getElementById("email").value.trim(); const telefono=document.getElementById("telefono").value.trim(); const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/; const validEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/; if(!validName.test(nome) || !validName.test(cognome)) return mostraErrore("Nome o cognome non validi."); if(!validEmail.test(email)) return mostraErrore("Email non valida."); if(telefono.length < 6) return mostraErrore("Numero di telefono non valido."); cacheDati={nome,cognome,email,telefono:"+39"+telefono}; document.getElementById("p-nome").textContent="Nome: "+nome; document.getElementById("p-cognome").textContent="Cognome: "+cognome; document.getElementById("p-email").textContent="Email: "+email; document.getElementById("p-telefono").textContent="Telefono: +39"+telefono; document.getElementById("popup-bg").style.display="flex";});document.getElementById("annulla").onclick=()=>{ document.getElementById("popup-bg").style.display="none";};document.getElementById("conferma").onclick=async()=>{ document.getElementById("popup-bg").style.display="none"; const msg=document.getElementById("msg"); msg.textContent=""; msg.className=""; const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{ method:"POST", headers:{ "Content-Type":"application/json", "x-event-id":eventoId }, body:JSON.stringify(cacheDati) }); if(res.status===200){ msg.textContent="Iscrizione completata!"; msg.className="ok"; document.getElementById("form").reset(); }else{ msg.textContent=await res.text(); msg.className="err"; }};function mostraErrore(t){ const msg=document.getElementById("msg"); msg.textContent=t; msg.className="err";}</script></body></html>
