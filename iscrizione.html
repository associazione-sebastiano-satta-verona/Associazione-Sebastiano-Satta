<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Iscrizione Evento - Associazione Sardi Sebastiano Satta di Verona</title><meta name="robots" content="noindex, nofollow"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700}.contenuto{max-width:600px;margin:auto;padding:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd}.counter-box{background:#fafafa;border:2px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}.counter-title{font-size:17px;font-weight:600}.counter-controls{display:flex;align-items:center;gap:12px}.counter-btn{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:22px;font-weight:700;cursor:pointer}.counter-value{font-size:20px;font-weight:700;width:28px;text-align:center}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}.popup-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999}.popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div class="counter-box"><div class="counter-title">Soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="soci" data-op="-">−</button><span id="count-soci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="soci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Non soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="nonsoci" data-op="-">−</button><span id="count-nonsoci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="nonsoci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Minori</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="minori" data-op="-">−</button><span id="count-minori" class="counter-value">0</span><button type="button" class="counter-btn" data-target="minori" data-op="+">+</button></div></div><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><script>const counters={soci:0,nonsoci:0,minori:0};document.querySelectorAll(".counter-btn").forEach(btn=>{ btn.onclick=()=>{ const t=btn.dataset.target,op=btn.dataset.op; if(op==="+"&&counters[t]<5)counters[t]++; if(op==="-"&&counters[t]>0)counters[t]--; document.getElementById("count-"+t).textContent=counters[t]; };});document.getElementById("form").onsubmit=(e)=>{ e.preventDefault(); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const total=counters.soci+counters.nonsoci+counters.minori; if(total<1)return alert("Seleziona almeno un partecipante"); fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{ method:"POST", headers:{"Content-Type":"application/json","x-event-id":new URLSearchParams(location.search).get("id")}, body:JSON.stringify({ nome,cognome, soci:counters.soci, nonsoci:counters.nonsoci, minori:counters.minori, key:new URLSearchParams(location.search).get("key") }) }).then(r=>r.text()).then(alert);};</script></body></html>
