<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><link rel="icon" type="image/png" href="logo-compressed.png"><title>Iscrizione Evento - Associazione Sardi Sebastiano Satta di Verona</title><meta name="description" content="Modulo di iscrizione agli eventi dell'Associazione dei Sardi 'Sebastiano Satta' di Verona. Compila i dati richiesti e conferma la partecipazione."><meta name="robots" content="noindex, nofollow"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:.3s}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700}.server-status{width:calc(100% - 40px);margin:12px auto 0 auto;padding:18px;background:#ffffff;color:black;font-size:20px;font-weight:900;text-align:center;display:none;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15)}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd}.counter-box{background:#fafafa;border:2px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}.counter-title{font-size:17px;font-weight:600}.counter-controls{display:flex;align-items:center;gap:12px}.counter-btn{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:22px;font-weight:700;cursor:pointer}.counter-value{font-size:20px;font-weight:700;width:28px;text-align:center}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}#popup-confirm-bg,#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}.popup-box{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;text-align:center;font-size:18px}.popup-box button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;width:100%}.btn-cancel{background:#ccc;color:#000}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div id="form-dettagliato"><div class="counter-box"><div class="counter-title">Soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="soci" data-op="-">−</button><span id="count-soci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="soci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Non soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="nonsoci" data-op="-">−</button><span id="count-nonsoci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="nonsoci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Minori</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="minori" data-op="-">−</button><span id="count-minori" class="counter-value">0</span><button type="button" class="counter-btn" data-target="minori" data-op="+">+</button></div></div></div><div id="form-semplice" style="display:none;"><div class="counter-box"><div class="counter-title">Partecipanti</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="partecipanti" data-op="-">−</button><span id="count-partecipanti" class="counter-value">0</span><button type="button" class="counter-btn" data-target="partecipanti" data-op="+">+</button></div></div></div><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><div id="popup-confirm-bg"><div class="popup-box"><p id="popup-confirm-text"></p><button id="popup-confirm-ok" class="btn-confirm">Conferma</button><button id="popup-confirm-cancel" class="btn-cancel">Annulla</button></div></div><div id="popup-msg-bg"><div class="popup-box"><p id="popup-msg-text"></p><button id="popup-msg-ok" class="btn-confirm">OK</button></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");const key=params.get("key");const specify=params.get("specify");document.getElementById("logo-home").onclick=()=>location.href="index.html";window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>document.getElementById("popup-msg-bg").style.display="none";const counters={soci:0,nonsoci:0,minori:0,partecipanti:0};document.querySelectorAll(".counter-btn").forEach(btn=>{btn.onclick=()=>{const t=btn.dataset.target,op=btn.dataset.op;if(op==="+"&&counters[t]<15)counters[t]++;if(op==="-"&&counters[t]>0)counters[t]--;document.getElementById("count-"+t).textContent=counters[t];};});if(specify==="false"){document.getElementById("form-dettagliato").style.display="none";document.getElementById("form-semplice").style.display="block";}document.getElementById("form").onsubmit=e=>{e.preventDefault();const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();let tot,soci,nonsoci,minori;if(specify==="false"){tot=counters.partecipanti;if(tot<1)return popupMsg("Seleziona almeno un partecipante");soci=tot;nonsoci=0;minori=0;document.getElementById("popup-confirm-text").innerHTML="<b>Nome:</b> "+nome+"<br><b>Cognome:</b> "+cognome+"<br><br><b>Partecipanti:</b> "+tot;}else{tot=counters.soci+counters.nonsoci+counters.minori;if(tot<1)return popupMsg("Seleziona almeno un partecipante");soci=counters.soci;nonsoci=counters.nonsoci;minori=counters.minori;document.getElementById("popup-confirm-text").innerHTML="<b>Nome:</b> "+nome+"<br><b>Cognome:</b> "+cognome+"<br><br><b>Soci:</b> "+soci+"<br><b>Non soci:</b> "+nonsoci+"<br><b>Minori:</b> "+minori;}document.getElementById("popup-confirm-bg").style.display="flex";document.getElementById("popup-confirm-ok").onclick=async()=>{document.getElementById("popup-confirm-bg").style.display="none";const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{method:"POST",headers:{"Content-Type":"application/json","x-event-id":eventoId},body:JSON.stringify({nome,cognome,soci,nonsoci,minori,key})});popupMsg(await res.text());};document.getElementById("popup-confirm-cancel").onclick=()=>{document.getElementById("popup-confirm-bg").style.display="none";};};</script><script>(function(){const ref=document.referrer;let source="direct";if(ref.includes("google."))source="google";else if(ref.includes("facebook.")||ref.includes("fb."))source="facebook";else if(ref.includes("instagram."))source="instagram";else if(ref.includes("tiktok."))source="tiktok";else if(ref.includes("whatsapp."))source="whatsapp";else if(ref.includes("canva."))source="canva";else if(ref)source=new URL(ref).hostname.replace("www.","");fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/utm-tracker",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({utm_source:source})});})();</script></body></html>
