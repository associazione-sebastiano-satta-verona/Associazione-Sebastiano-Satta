me="twitter:image" content="https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/logo.png"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:.3s}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;white-space:normal;word-break:break-word;line-height:1.2;max-width:80%}.server-status{width:calc(100% - 40px);margin:12px auto 0 auto;padding:18px;background:#ffffff;color:black;font-size:20px;font-weight:900;text-align:center;display:none;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15)}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd}.counter-box{background:#fafafa;border:2px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}.counter-title{font-size:17px;font-weight:600}.counter-controls{display:flex;align-items:center;gap:12px}.counter-btn{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:22px;font-weight:700;cursor:pointer}.counter-value{font-size:20px;font-weight:700;width:28px;text-align:center}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}.popup-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999}.popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease}.popup h2{text-align:center;margin-bottom:15px;font-size:24px}.popup p{font-size:17px;margin:6px 0;color:#333}.popup-buttons{display:flex;gap:12px;margin-top:20px}.popup-buttons button{flex:1;padding:12px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer}.btn-cancel{background:#ccc}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div id="form-dettagliato"><div class="counter-box"><div class="counter-title">Soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="soci" data-op="-">−</button><span id="count-soci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="soci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Non soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="nonsoci" data-op="-">−</button><span id="count-nonsoci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="nonsoci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Minori</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="minori" data-op="-">−</button><span id="count-minori" class="counter-value">0</span><button type="button" class="counter-btn" data-target="minori" data-op="+">+</button></div></div></div><div id="form-semplice" style="display:none;"><div class="counter-box"><div class="counter-title">Partecipanti</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="partecipanti" data-op="-">−</button><span id="count-partecipanti" class="counter-value">0</span><button type="button" class="counter-btn" data-target="partecipanti" data-op="+">+</button></div></div></div><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><div class="popup-bg" id="popup-bg"><div class="popup"><h2>Conferma Iscrizione</h2><p id="p-nome"></p><p id="p-cognome"></p><p id="p-soci"></p><p id="p-nonsoci"></p><p id="p-minori"></p><p id="p-partecipanti"></p><div class="popup-buttons"><button class="btn-cancel" id="annulla">Annulla</button><button class="btn-confirm" id="conferma">Conferma</button></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");const key=params.get("key");const specify=params.get("specify");document.getElementById("logo-home").onclick=()=>location.href="index.html";window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>document.getElementById("popup-msg-bg").style.display="none";const counters={soci:0,nonsoci:0,minori:0,partecipanti:0};document.querySelectorAll(".counter-btn").forEach(btn=>{btn.onclick=()=>{const t=btn.dataset.target,op=btn.dataset.op;const max=(t==="partecipanti"?15:5);if(op==="+"&&counters[t]<max)counters[t]++;if(op==="-"&&counters[t]>0)counters[t]--;document.getElementById("count-"+t).textContent=counters[t];};});if(specify==="false"){document.getElementById("form-dettagliato").style.display="none";document.getElementById("form-semplice").style.display="block";}document.getElementById("form").onsubmit=e=>{e.preventDefault();const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();let tot,soci,nonsoci,minori,partecipanti;document.getElementById("p-nome").textContent="Nome: "+nome;document.getElementById("p-cognome").textContent="Cognome: "+cognome;document.getElementById("p-soci").textContent="";document.getElementById("p-nonsoci").textContent="";document.getElementById("p-minori").textContent="";document.getElementById("p-partecipanti").textContent="";if(specify==="false"){tot=counters.partecipanti;if(tot<1)return popupMsg("Seleziona almeno un partecipante");partecipanti=tot;document.getElementById("p-partecipanti").textContent="Partecipanti: "+tot;}else{tot=counters.soci+counters.nonsoci+counters.minori;if(tot<1)return popupMsg("Seleziona almeno un partecipante");soci=counters.soci;nonsoci=counters.nonsoci;minori=counters.minori;document.getElementById("p-soci").textContent="Soci: "+soci;document.getElementById("p-nonsoci").textContent="Non soci: "+nonsoci;document.getElementById("p-minori").textContent="Minori: "+minori;}document.getElementById("popup-bg").style.display="flex";document.getElementById("annulla").onclick=()=>{document.getElementById("popup-bg").style.display="none";};document.getElementById("conferma").onclick=async()=>{document.getElementById("popup-bg").style.display="none";let payload;if(specify==="false"){payload={nome,cognome,partecipanti,key};}else{payload={nome,cognome,soci,nonsoci,minori,key};}const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{method:"POST",headers:{"Content-Type":"application/json","x-event-id":eventoId},body:JSON.stringify(payload)});const text=await res.text();if(text==="OK") return popupMsg("Iscrizione completata!");if(text==="Chiave mancante") return popupMsg("Chiave mancante");if(text==="Chiave non valida") return popupMsg("Impossibile effettuare l'iscrizione");return popupMsg(text);};};</script><script>async function checkServerStatus() {const banner=document.getElementById("server-status");try{const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione");if(!res.ok){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";return;}const data=await res.json();if(data.status==="maintenance"){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";}}catch(e){banner.textContent="⚠️ Impossibile contattare il server";banner.style.display="block";}}checkServerStatus();</script><script>(function(){const ref=document.referrer;let source="direct";if(ref.includes("google."))source="google";else if(ref.includes("facebook.")||ref.includes("fb."))source="facebook";else if(ref.includes("instagram."))source="instagram";else if(ref.includes("tiktok."))source="tiktok";else if(ref.includes("whatsapp."))source="whatsapp";else if(ref.includes("canva."))source="canva";else if(ref)source=new URL(ref).hostname.replace("www.","");fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/utm-tracker",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({utm_source:source})});})();</script><noscript><style> body { margin: 0; padding: 0; overflow: hidden !important; } #noscript-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(90deg, #d40000, #0044ff); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; text-align: center; color: #fff; font-family: Arial, sans-serif; z-index: 999999; } #noscript-overlay img { width: 120px; height: 120px; border-radius: 35%; margin-bottom: 25px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); } #noscript-overlay h1 { font-size: 26px; font-weight: 800; margin-bottom: 15px; } #noscript-overlay p { font-size: 18px; line-height: 1.5; max-width: 500px; }</style><div id="noscript-overlay"><img src="logo.png" alt="Logo Associazione Sardi Sebastiano Satta di Verona"><h1>JavaScript necessario</h1><p> Il sito dell'Associazione Sardi "Sebastiano Satta" di Verona ha bisogno di JavaScript abilitato sul dispositivo per funzionare correttamente.<br><br> Per favore, abilitalo nelle impostazioni del browser e ricarica la pagina. </p></div></noscript></body></html>
