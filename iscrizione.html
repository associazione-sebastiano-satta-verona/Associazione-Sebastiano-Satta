<!DOCTYPE html><html lang="it"><head><meta name="theme-color" content="#d40000"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Iscrizione Evento</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.btn-main{ margin:25px auto 0 auto; background:linear-gradient(90deg,#d40000,#0044ff); color:#fff; border:none; border-radius:10px; padding:14px 22px; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 12px rgba(0,0,0,.15); transition:transform .2s,opacity .2s;}.btn-main:hover{transform:translateY(-2px);opacity:.9}#msg{margin-top:25px;text-align:center;font-size:18px;font-weight:600}#msg.ok{color:#0a8a0a}#msg.err{color:#d40000}.loading{opacity:.6;pointer-events:none}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><input type="email" id="email" placeholder="Email" required><input type="tel" id="telefono" placeholder="Telefono" required><button type="submit" class="btn-main">Invia Iscrizione</button></form><div id="msg"></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});document.getElementById("form").addEventListener("submit",async(e)=>{ e.preventDefault(); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const email=document.getElementById("email").value.trim(); const telefono=document.getElementById("telefono").value.trim(); const msg=document.getElementById("msg"); msg.textContent=""; msg.className=""; const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/; const validEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/; const validPhone=/^[0-9+ ]{6,20}$/; if(!validName.test(nome) || !validName.test(cognome) || !validEmail.test(email) || !validPhone.test(telefono)){ msg.textContent="Dati non validi."; msg.className="err"; return; } const form=document.getElementById("form"); form.classList.add("loading"); const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{ method:"POST", headers:{ "Content-Type":"application/json", "x-event-id":eventoId }, body:JSON.stringify({nome,cognome,email,telefono}) }); form.classList.remove("loading"); if(res.status===200){ msg.textContent="Iscrizione completata!"; msg.className="ok"; form.reset(); }else{ const t=await res.text(); msg.textContent=t; msg.className="err"; }});</script></body></html>
