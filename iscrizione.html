<!DOCTYPE html><html lang="it"><head><meta name="theme-color" content="#d40000"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Iscrizione Evento</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.phone-wrapper{display:flex;gap:10px}.phone-prefix{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;background:#eee;width:90px;text-align:center;pointer-events:none;user-select:none}.phone-input{flex:1}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.socio-wrapper{display:flex;gap:18px;margin-top:5px}.socio-option{flex:1;display:flex;align-items:center;gap:12px;padding:14px;border:2px solid #ddd;border-radius:10px;cursor:pointer;transition:.2s;background:#fafafa;font-size:17px}.socio-option:hover{border-color:#0044ff}.socio-option input{display:none}.socio-option .dot{width:22px;height:22px;border:2px solid #0044ff;border-radius:50%;display:inline-block;position:relative;transition:.2s}.socio-option input:checked + .dot{background:#0044ff;border-color:#0044ff}.label-text{font-size:17px}.popup-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999}.popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease}.popup h2{text-align:center;margin-bottom:15px;font-size:24px}.popup p{font-size:17px;margin:6px 0;color:#333}.popup-buttons{display:flex;gap:12px;margin-top:20px}.popup-buttons button{flex:1;padding:12px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer}.btn-cancel{background:#ccc}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><input type="email" id="email" placeholder="Email" required><div class="phone-wrapper"><div class="phone-prefix">+39</div><input type="tel" id="telefono" class="phone-input" placeholder="Telefono" required></div><div class="socio-wrapper"><label class="socio-option"><input type="radio" name="socio" value="si" required><span class="dot"></span><span class="label-text">Sì</span></label><label class="socio-option"><input type="radio" name="socio" value="no" required><span class="dot"></span><span class="label-text">No</span></label></div><input type="text" id="hp" style="display:none"><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><div class="popup-bg" id="popup-bg"><div class="popup"><h2>Conferma Iscrizione</h2><p id="p-nome"></p><p id="p-cognome"></p><p id="p-email"></p><p id="p-telefono"></p><p id="p-socio"></p><div class="popup-buttons"><button class="btn-cancel" id="annulla">Annulla</button><button class="btn-confirm" id="conferma">Conferma</button></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled")});document.getElementById("telefono").addEventListener("input",()=>{const t=document.getElementById("telefono");t.value=t.value.replace(/[^0-9]/g,"")});let cacheDati=null;const startTime=Date.now();function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none";};document.getElementById("form").addEventListener("submit",(e)=>{e.preventDefault();const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();const email=document.getElementById("email").value.trim().toLowerCase();const telefono=document.getElementById("telefono").value.trim();const socio=document.querySelector('input[name="socio"]:checked')?.value;const hp=document.getElementById("hp").value;if(hp!=="")return popupMsg("Errore di validazione.");if(Date.now()-startTime<1200)return popupMsg("Errore di validazione.");const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/;if(!validName.test(nome))return popupMsg("Nome non valido.");if(!validName.test(cognome))return popupMsg("Cognome non valido.");const validEmail=/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;if(!validEmail.test(email))return popupMsg("Email non valida.");const domain=email.split("@")[1];const blocked=["tempmail.com","10minutemail.com","yopmail.com","mailinator.com","guerrillamail.com","trashmail.com","fakeinbox.com","getnada.com","dispostable.com","moakt.com","emailondeck.com","tempinbox.com","throwawaymail.com","maildrop.cc","inboxkitten.com","spamgourmet.com","mintemail.com","mytemp.email","temp-mail.org","mailcatch.com","spambox.us","spamex.com","spam4.me","mailnesia.com","sharklasers.com","grr.la","guerrillamail.net","guerrillamail.de","guerrillamail.biz","guerrillamail.org","guerrillamail.info","guerrillamail.com","guerrillamailblock.com","mail-temporaire.fr","tempail.com","fakemailgenerator.com","fakemail.net","trashmail.se","trashmail.de","trashmail.io","mailtothis.com","tempmailo.com","tempr.email","mailpoof.com","mail7.io","dropmail.me","mohmal.com","harakirimail.com","linshiyouxiang.net","mailnull.com","spamfree24.org","spamfree24.com","spamfree24.net","spamfree24.info","spamfree24.de","spamfree24.eu","spamfree24.biz","spambog.com","spambog.de","spambog.ru","spambox.xyz","spaml.de","spaml.com","spaml.net"];if(blocked.includes(domain))return popupMsg("Dominio email non valido.");if(telefono.length<6)return popupMsg("Numero di telefono non valido.");if(!socio)return popupMsg("Compila questo campo.");cacheDati={nome,cognome,email,telefono:"+39"+telefono,socio};document.getElementById("p-nome").textContent="Nome: "+nome;document.getElementById("p-cognome").textContent="Cognome: "+cognome;document.getElementById("p-email").textContent="Email: "+email;document.getElementById("p-telefono").textContent="Telefono: +39"+telefono;document.getElementById("p-socio").textContent="Socio: "+(socio==="si"?"Sì":"No");document.getElementById("popup-bg").style.display="flex";});document.getElementById("annulla").onclick=()=>{document.getElementById("popup-bg").style.display="none";};document.getElementById("conferma").onclick=async()=>{document.getElementById("popup-bg").style.display="none";const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{method:"POST",headers:{"Content-Type":"application/json","x-event-id":eventoId},body:JSON.stringify(cacheDati)});if(res.status===200){popupMsg("Iscrizione completata!");document.getElementById("form").reset();}else{popupMsg(await res.text());}};</script></body></html>
