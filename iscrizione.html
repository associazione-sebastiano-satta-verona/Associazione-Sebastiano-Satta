<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Iscrizione Evento - Associazione Sardi Sebastiano Satta di Verona</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.socio-label{font-size:17px;font-weight:600;margin-bottom:-10px;margin-top:5px}.socio-wrapper{display:flex;gap:18px;margin-top:5px;flex-wrap:wrap}.socio-option{flex:1;display:flex;align-items:center;gap:12px;padding:14px;border:2px solid #ddd;border-radius:10px;cursor:pointer;transition:.2s;background:#fafafa;font-size:17px;position:relative;min-width:80px}.socio-option:hover{border-color:#0044ff}.socio-option input{position:absolute;opacity:0;pointer-events:none}.socio-option .dot{width:22px;height:22px;border:2px solid #0044ff;border-radius:50%;display:inline-block;position:relative;transition:.2s}.socio-option input:checked + .dot{background:#0044ff;border-color:#0044ff}.label-text{font-size:17px}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.popup-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999}.popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease}.popup h2{text-align:center;margin-bottom:15px;font-size:24px}.popup p{font-size:17px;margin:6px 0;color:#333}.popup-buttons{display:flex;gap:12px;margin-top:20px}.popup-buttons button{flex:1;padding:12px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer}.btn-cancel{background:#ccc}.btn-confirm{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div class="socio-label">Solo i soci possono iscriversi</div><div class="socio-wrapper"><label class="socio-option"><input type="radio" name="socio" value="si" required checked><span class="dot"></span><span class="label-text">Sono socio</span></label></div><div class="socio-label">Numero partecipanti</div><div class="socio-wrapper"><label class="socio-option"><input type="radio" name="partecipanti" value="1" required><span class="dot"></span><span class="label-text">1</span></label><label class="socio-option"><input type="radio" name="partecipanti" value="2" required><span class="dot"></span><span class="label-text">2</span></label><label class="socio-option"><input type="radio" name="partecipanti" value="3" required><span class="dot"></span><span class="label-text">3</span></label><label class="socio-option"><input type="radio" name="partecipanti" value="4" required><span class="dot"></span><span class="label-text">4</span></label><label class="socio-option"><input type="radio" name="partecipanti" value="5" required><span class="dot"></span><span class="label-text">5</span></label></div><input type="text" id="hp" style="display:none"><input type="text" id="hp2" style="display:none"><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><div class="popup-bg" id="popup-bg"><div class="popup"><h2>Conferma Iscrizione</h2><p id="p-nome"></p><p id="p-cognome"></p><p id="p-socio"></p><p id="p-partecipanti"></p><div class="popup-buttons"><button class="btn-cancel" id="annulla">Annulla</button><button class="btn-confirm" id="conferma">Conferma</button></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");const token=params.get("token");document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled")});let cacheDati=null;const startTime=Date.now();function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none"};document.getElementById("form").addEventListener("submit",(e)=>{e.preventDefault();if(!token)return popupMsg("Token mancante.");const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();const socio="si";const partecipanti=document.querySelector('input[name="partecipanti"]:checked')?.value;const hp=document.getElementById("hp").value;const hp2=document.getElementById("hp2").value;if(hp!=="")return popupMsg("Errore di validazione.");if(hp2!=="")return popupMsg("Errore di validazione.");if(Date.now()-startTime<1200)return popupMsg("Errore di validazione.");const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/;if(!validName.test(nome))return popupMsg("Nome non valido.");if(!validName.test(cognome))return popupMsg("Cognome non valido.");if(!partecipanti)return popupMsg("Numero partecipanti obbligatorio");cacheDati={nome,cognome,socio,partecipanti};document.getElementById("p-nome").textContent="Nome: "+nome;document.getElementById("p-cognome").textContent="Cognome: "+cognome;document.getElementById("p-socio").textContent="Socio: Sì";document.getElementById("p-partecipanti").textContent="Partecipanti: "+partecipanti;document.getElementById("popup-bg").style.display="flex";});document.getElementById("annulla").onclick=()=>{document.getElementById("popup-bg").style.display="none"};document.getElementById("conferma").onclick=async()=>{document.getElementById("popup-bg").style.display="none";const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{method:"POST",headers:{"Content-Type":"application/json","x-event-id":eventoId},body:JSON.stringify({...cacheDati,token})});if(res.status===200){popupMsg("Iscrizione completata!");document.getElementById("form").reset();}else{popupMsg(await res.text());}};</script></body></html>
