!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Iscrizione Evento - Associazione Sardi Sebastiano Satta di Verona</title><meta name="description" content="Modulo di iscrizione agli eventi dell'Associazione dei Sardi 'Sebastiano Satta' di Verona. Compila i dati richiesti e conferma la partecipazione."><meta name="keywords" content="Iscrizione evento Sardi Verona, modulo iscrizione evento, Associazione Sebastiano Satta Verona, partecipazione eventi sardi"><meta name="robots" content="noindex, nofollow"><meta property="og:title" content="Iscrizione Evento - Associazione Sardi Sebastiano Satta di Verona"><meta property="og:description" content="Compila il modulo per iscriverti agli eventi dell'Associazione dei Sardi 'Sebastiano Satta' di Verona."><meta property="og:image" content="https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/logo.png"><meta property="og:url" content="https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/iscrizione.html"><meta property="og:type" content="website"><meta property="og:site_name" content="Associazione Sardi Sebastiano Satta di Verona"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:.3s}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700}.server-status{width:calc(100% - 40px);margin:12px auto 0 auto;padding:18px;background:#ffffff;color:black;font-size:20px;font-weight:900;text-align:center;display:none;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,0.15);letter-spacing:0.5px;text-shadow:0 2px 4px rgba(0,0,0,0.35);}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd}.counter-box{background:#fafafa;border:2px solid #ddd;border-radius:10px;padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}.counter-title{font-size:17px;font-weight:600}.counter-controls{display:flex;align-items:center;gap:12px}.counter-btn{background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:8px;width:36px;height:36px;font-size:22px;font-weight:700;cursor:pointer}.counter-value{font-size:20px;font-weight:700;width:28px;text-align:center}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Iscrizione Evento</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><div class="counter-box"><div class="counter-title">Soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="soci" data-op="-">−</button><span id="count-soci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="soci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Non soci</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="nonsoci" data-op="-">−</button><span id="count-nonsoci" class="counter-value">0</span><button type="button" class="counter-btn" data-target="nonsoci" data-op="+">+</button></div></div><div class="counter-box"><div class="counter-title">Minori</div><div class="counter-controls"><button type="button" class="counter-btn" data-target="minori" data-op="-">−</button><span id="count-minori" class="counter-value">0</span><button type="button" class="counter-btn" data-target="minori" data-op="+">+</button></div></div><button type="submit" class="btn-main">Invia Iscrizione</button></form></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const params=new URLSearchParams(window.location.search);const eventoId=params.get("id");const key=params.get("key");document.getElementById("logo-home").onclick=()=>location.href="index.html";window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){ document.getElementById("popup-msg-text").textContent=t; document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>document.getElementById("popup-msg-bg").style.display="none";const counters={soci:0,nonsoci:0,minori:0};document.querySelectorAll(".counter-btn").forEach(btn=>{ btn.onclick=()=>{ const t=btn.dataset.target,op=btn.dataset.op; if(op==="+"&&counters[t]<5)counters[t]++; if(op==="-"&&counters[t]>0)counters[t]--; document.getElementById("count-"+t).textContent=counters[t]; };});document.getElementById("form").onsubmit=async(e)=>{ e.preventDefault(); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const total=counters.soci+counters.nonsoci+counters.minori; if(total<1)return popupMsg("Seleziona almeno un partecipante"); const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/iscrizione",{ method:"POST", headers:{"Content-Type":"application/json","x-event-id":eventoId}, body:JSON.stringify({ nome,cognome, soci:counters.soci, nonsoci:counters.nonsoci, minori:counters.minori, key }) }); popupMsg(await res.text());};async function checkServerStatus(){ const banner=document.getElementById("server-status"); try{ const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if(!res.ok){ banner.textContent="⚠️ Sito in manutenzione"; banner.style.display="block"; return; } const data=await res.json(); if(data.status==="maintenance"){ banner.textContent="⚠️ Sito in manutenzione"; banner.style.display="block"; } }catch{ banner.textContent="⚠️ Impossibile contattare il server"; banner.style.display="block"; }}checkServerStatus();</script></body></html>
