name: Generate Sitemap

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate sitemap-index.xml
        run: |
          cat > generate-sitemap.mjs << 'EOF'
          import fs from "fs";

          const supabaseUrl = "https://jfdqkbdqyrdqsxoippgy.supabase.co";
          const anonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZHFrYmRxeXJkcXN4b2lwcGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2ODg4NDYsImV4cCI6MjA4NTI2NDg0Nn0.uQxL5bWSFTymZYs-r3ZCWNc7wDPsA-bt0G9lSpfhFpI";

          const tables = [
            { table: "notizie", url: "notizia.html?id=" },
            { table: "eventi", url: "evento.html?id=" },
            { table: "prodotti", url: "prodotto.html?id=" },
            { table: "organi_sociali", url: "organo-sociale.html?id=" }
          ];

          async function main() {
            let urls = [];
            const today = new Date().toISOString().split('T')[0];

            const staticPages = [
              "",
              "notizie.html",
              "eventi.html",
              "prodotti.html",
              "storia.html",
              "organi-sociali.html",
              "tesseramento.html",
              "contatti.html"
            ];

            staticPages.forEach(page => {
              urls.push(`  <url>
    <loc>https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/${page}</loc>
    <lastmod>${today}</lastmod>
    <changefreq>weekly</changefreq>
    <priority>0.8</priority>
  </url>`);
            });

            for (const t of tables) {
              try {
                const res = await fetch(`${supabaseUrl}/rest/v1/${t.table}?select=id`, {
                  headers: { apikey: anonKey }
                });

                if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
                const data = await res.json();

                data.forEach(row => {
                  urls.push(`  <url>
    <loc>https://associazione-sebastiano-satta-verona.github.io/Associazione-Sebastiano-Satta/${t.url}${row.id}</loc>
    <lastmod>${today}</lastmod>
    <changefreq>weekly</changefreq>
    <priority>0.7</priority>
  </url>`);
                });
              } catch (error) {
                console.error(`Error fetching table ${t.table}:`, error);
              }
            }

            const xml = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${urls.join("\n")}
</urlset>`;

            fs.writeFileSync("sitemap-index.xml", xml.trim());
          }

          main();
          EOF

          node generate-sitemap.mjs

      - name: Commit sitemap-index.xml
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap-index.xml
          git commit -m "Update sitemap-index.xml" || echo "No changes to commit"
          git push