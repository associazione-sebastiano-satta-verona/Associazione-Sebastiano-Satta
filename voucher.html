<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><link rel="icon" type="image/png" href="logo-compressed.png"><title>Voucher - Associazione Sardi Sebastiano Satta di Verona</title><meta name="description" content="Visualizza il tuo voucher dell'Associazione dei Sardi 'Sebastiano Satta' di Verona."><meta name="robots" content="noindex, nofollow"><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700}.contenuto{max-width:600px;margin:auto;padding:20px;text-align:center}h1{font-size:30px;margin-bottom:20px}#qrcode{margin-top:30px;display:none}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Voucher</h1><div id="info"></div><canvas id="qrcode"></canvas></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script><script>document.getElementById("logo-home").onclick=function(){window.location.href="index.html"};function popupMsg(t){ document.getElementById("popup-msg-text").innerHTML=t; document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=function(){ document.getElementById("popup-msg-bg").style.display="none";};const params=new URLSearchParams(window.location.search);const token=params.get("token");async function start(){ if(!token || token.length!==64){ popupMsg("Voucher non valido o mancante."); document.getElementById("info").innerHTML="Voucher non valido"; return; } let res; try{ res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/preview-voucher",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({codice:token}) }); }catch(e){ popupMsg("Errore di connessione al server."); document.getElementById("info").innerHTML="Errore di connessione"; return; } const text = await res.text(); if(res.status!==200){ popupMsg(text); document.getElementById("info").innerHTML=text; return; } document.getElementById("info").innerHTML="Voucher valido"; const canvas=document.getElementById("qrcode"); canvas.style.display="block"; try{ QRCode.toCanvas(canvas, token, { scale: 8 }); }catch(e){ popupMsg("Errore nella generazione del QR-Code."); }}start();</script><noscript><style>body{margin:0;padding:0;overflow:hidden!important}#noscript-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(90deg,#d40000,#0044ff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;color:#fff;font-family:Arial,sans-serif;z-index:999999}#noscript-overlay img{width:120px;height:120px;border-radius:35%;margin-bottom:25px}#noscript-overlay h1{font-size:26px;font-weight:800;margin-bottom:15px}#noscript-overlay p{font-size:18px;line-height:1.5;max-width:500px}</style><div id="noscript-overlay"><img src="logo.png"><h1>JavaScript necessario</h1><p>Abilitalo nelle impostazioni del browser e ricarica la pagina.</p></div></noscript></body></html>
