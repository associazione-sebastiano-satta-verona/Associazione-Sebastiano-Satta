lign:center}h1{font-size:30px;margin-bottom:20px}#qrcode{margin-top:30px;display:none}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Voucher</h1><div id="info"></div><canvas id="qrcode"></canvas></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script type="module">import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.esm.js";document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled")});function popupMsg(t){document.getElementById("popup-msg-text").innerHTML=t;document.getElementById("popup-msg-bg").style.display="flex"}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none"};const params=new URLSearchParams(window.location.search);const token=params.get("token");if(!token||token.length!==64){popupMsg("Token non valido.");}else{verifica();}async function verifica(){const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/preview-voucher",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({codice:token})});const text=await res.text();if(res.status!==200){popupMsg(text);return;}document.getElementById("info").innerHTML="Voucher valido";const canvas=document.getElementById("qrcode");canvas.style.display="block";QRCode.toCanvas(canvas,token,{scale:8});}async function checkServerStatus(){const banner=document.getElementById("server-status");try{const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione");if(!res.ok){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";return;}const data=await res.json();if(data.status==="maintenance"){banner.textContent="⚠️ Sito in manutenzione";banner.style.display="block";}}catch{banner.textContent="⚠️ Impossibile contattare il server";banner.style.display="block";}}checkServerStatus();</script><noscript><style>body{margin:0;padding:0;overflow:hidden!important}#noscript-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(90deg,#d40000,#0044ff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;text-align:center;color:#fff;font-family:Arial,sans-serif;z-index:999999}#noscript-overlay img{width:120px;height:120px;border-radius:35%;margin-bottom:25px;box-shadow:0 4px 14px rgba(0,0,0,0.25)}#noscript-overlay h1{font-size:26px;font-weight:800;margin-bottom:15px}#noscript-overlay p{font-size:18px;line-height:1.5;max-width:500px}</style><div id="noscript-overlay"><img src="logo.png"><h1>JavaScript necessario</h1><p>Il sito dell'Associazione Sardi "Sebastiano Satta" di Verona ha bisogno di JavaScript abilitato per funzionare correttamente.<br><br>Abilitalo nelle impostazioni del browser e ricarica la pagina.</p></div></noscript></body></html>
