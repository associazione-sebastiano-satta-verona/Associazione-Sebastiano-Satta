up-msg button{ margin-top:20px; padding:12px 20px; border:none; border-radius:10px; background:linear-gradient(90deg,#d40000,#0044ff); color:#fff; font-size:17px; font-weight:700; cursor:pointer; width:100%;}@keyframes fadeIn{ from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)}}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div id="server-status" class="server-status"></div><div class="contenuto"><h1>Voucher</h1><div id="qrcode"></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script>document.getElementById("logo-home").onclick=function(){ window.location.href="index.html";};function popupMsg(t, redirect=false){ document.getElementById("popup-msg-text").innerHTML=t; document.getElementById("popup-msg-bg").style.display="flex"; document.getElementById("popup-msg-ok").onclick=function(){ document.getElementById("popup-msg-bg").style.display="none"; if(redirect) window.location.href="index.html"; };}const params=new URLSearchParams(window.location.search);const token=params.get("token");async function start(){ if(!token){ popupMsg("Token mancante", true); return; } if(token.length!==128){ popupMsg("Voucher non valido", true); return; } let res; try{ res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/preview-voucher",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({codice:token}) }); }catch(e){ popupMsg("Errore di connessione", true); return; } const text = await res.text(); if(res.status!==200){ popupMsg(text, true); return; } const qr=document.getElementById("qrcode"); qr.style.display="block"; new QRCode(qr, { text: token, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.H });}start();</script><script>async function checkServerStatus() { const banner = document.getElementById("server-status"); try { const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if (!res.ok) { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; return; } const data = await res.json(); if (data.status === "maintenance") { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; } } catch { banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; }}checkServerStatus();</script><script>(function() { const ref = document.referrer; let source = "direct"; if (ref.includes("google.")) source = "google"; else if (ref.includes("facebook.") || ref.includes("fb.")) source = "facebook"; else if (ref.includes("instagram.")) source = "instagram"; else if (ref.includes("tiktok.")) source = "tiktok"; else if (ref.includes("whatsapp.")) source = "whatsapp"; else if (ref.includes("canva.")) source = "canva"; else if (ref) source = new URL(ref).hostname.replace("www.", ""); fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/utm-tracker", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ utm_source: source }) });})();</script><noscript><style>body{margin:0;padding:0;overflow:hidden!important}#noscript-overlay{ position:fixed; top:0;left:0; width:100vw;height:100vh; background:linear-gradient(90deg,#d40000,#0044ff); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; color:#fff; font-family:Arial,sans-serif; z-index:999999;}#noscript-overlay img{ width:120px;height:120px; border-radius:35%; margin-bottom:25px;}#noscript-overlay h1{ font-size:26px; font-weight:800; margin-bottom:15px;}#noscript-overlay p{ font-size:18px; line-height:1.5; max-width:500px;}</style><div id="noscript-overlay"><img src="logo.png"><h1>JavaScript necessario</h1><p>Abilitalo nelle impostazioni del browser e r
