<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Verifica Iscrizione</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}.loading-bar-container{width:100%;max-width:420px;height:12px;background:#fff;border-radius:10px;margin:30px auto;overflow:hidden;display:none;border:2px solid #e0e0e0}.loading-bar{height:100%;width:0;background:linear-gradient(90deg,#d40000,#0044ff);transition:width .25s ease}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}.hp-field{position:absolute;left:-9999px;opacity:0;pointer-events:none}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Verifica Iscrizione</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><input type="text" id="hp" class="hp-field"><input type="text" id="hp2" class="hp-field"><button type="submit" class="btn-main" id="btn">Verifica</button></form><div id="loading-bar-container" class="loading-bar-container"><div id="loading-bar" class="loading-bar"></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const startTime=Date.now();document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled")});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex"}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none"};function startLoadingBar(){ const c=document.getElementById("loading-bar-container"); const b=document.getElementById("loading-bar"); c.style.display="block"; let p=0; const i=setInterval(()=>{ p+=10; b.style.width=p+"%"; if(p>=90)clearInterval(i); },200); return()=>{b.style.width="100%";setTimeout(()=>c.style.display="none",300);}}document.getElementById("form").addEventListener("submit",async(e)=>{ e.preventDefault(); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const hp=document.getElementById("hp").value; const hp2=document.getElementById("hp2").value; if(hp!=="")return popupMsg("Errore di validazione."); if(hp2!=="")return popupMsg("Errore di validazione."); if(Date.now()-startTime<1200)return popupMsg("Errore di validazione."); const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/; if(!validName.test(nome))return popupMsg("Nome non valido."); if(!validName.test(cognome))return popupMsg("Cognome non valido."); const params=new URLSearchParams(window.location.search); const token=params.get("id"); if(!token)return popupMsg("Link non valido."); const stop=startLoadingBar(); document.getElementById("btn").disabled=true; const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token,nome,cognome}) }); stop(); if(res.status===200){ popupMsg("Iscrizione trovata!"); } else { popupMsg(await res.text()); } document.getElementById("btn").disabled=false;});</script></body></html>
