<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Verifica Iscrizione</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px;text-align:center;}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease;}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);-webkit-backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70));}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer;}.header-title{font-size:20px;font-weight:700;white-space:normal;line-height:1.2;max-width:80%;}@media(max-width:380px){.header-title{font-size:17px}.header img{width:40px;height:40px}}.form-box{margin-top:40px;padding:25px;border-radius:12px;width:90%;max-width:500px;margin-left:auto;margin-right:auto;background:#f7f7f7;box-shadow:0 4px 12px rgba(0,0,0,.1);}input{width:90%;padding:12px;margin:10px 0;font-size:18px;border-radius:8px;border:2px solid #ccc;}.telefono-wrapper{display:flex;justify-content:center;align-items:center;gap:10px;}.prefisso{padding:12px 15px;background:#e6e6e6;border-radius:8px;font-size:18px;border:2px solid #ccc;user-select:none;}.telefono{width:70%;}button{margin-top:15px;padding:12px 25px;font-size:20px;font-weight:700;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:white;cursor:pointer;}button:disabled{opacity:.6;}.result-box{margin-top:40px;padding:30px;border-radius:12px;font-size:26px;font-weight:700;width:85%;max-width:600px;margin-left:auto;margin-right:auto;display:none;}.ok{background:#d4ffd4;color:#008000;border:3px solid #008000;}.err{background:#ffd4d4;color:#b30000;border:3px solid #b30000;}.loader{margin-top:40px;display:none;}.spinner{width:60px;height:60px;border:6px solid #ccc;border-top-color:#d40000;border-radius:50%;animation:spin .9s linear infinite;margin:auto;}@keyframes spin{to{transform:rotate(360deg);}}.hp-field{position:absolute;left:-9999px;opacity:0;pointer-events:none;}.debug-box{ margin-top:20px; padding:15px; background:#eee; border-radius:10px; font-size:16px; color:#333; display:none; width:85%; max-width:600px; margin-left:auto; margin-right:auto; word-break:break-word;}</style></head><body><div class="header"><img id="logo-home" src="logo.png" alt="Logo"><div class="header-title">Verifica Iscrizione</div></div><div id="form" class="form-box"><h2>Inserisci i tuoi dati</h2><input id="nome" type="text" placeholder="Nome" maxlength="40"><input id="cognome" type="text" placeholder="Cognome" maxlength="40"><input id="email" type="email" placeholder="Email" maxlength="80"><div class="telefono-wrapper"><div class="prefisso">+39</div><input id="telefono" class="telefono" type="text" placeholder="Telefono" maxlength="15"></div><input id="hp1" class="hp-field" type="text" autocomplete="off"><input id="hp2" class="hp-field" type="text" autocomplete="off"><button id="btn" onclick="verifica()">Verifica</button></div><div id="loader" class="loader"><div class="spinner"></div></div><div id="result" class="result-box"></div><div id="debug" class="debug-box"></div><script>window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});document.getElementById("logo-home").addEventListener("click",()=>{ window.location.href="index.html";});async function verifica(){ const params=new URLSearchParams(window.location.search); const token=params.get("id"); const debugMode=params.get("debug"); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const email=document.getElementById("email").value.trim(); const telefono="+39"+document.getElementById("telefono").value.trim(); const hp1=document.getElementById("hp1").value; const hp2=document.getElementById("hp2").value; const btn=document.getElementById("btn"); const form=document.getElementById("form"); const loader=document.getElementById("loader"); const box=document.getElementById("result"); const debug=document.getElementById("debug"); debug.style.display="none"; debug.textContent=""; if(hp1!==""||hp2!==""){ form.style.display="none"; box.textContent="Errore"; box.className="result-box err"; box.style.display="block"; return; } if(!token){ form.style.display="none"; box.textContent="Link non valido"; box.className="result-box err"; box.style.display="block"; return; } btn.disabled=true; box.style.display="none"; loader.style.display="block"; const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token,nome,cognome,email,telefono,hp1,hp2}) }); const data=await res.json().catch(()=>null); loader.style.display="none"; if(res.status===200){ box.textContent="ISCRIZIONE TROVATA"; box.className="result-box ok"; } else { box.textContent="ISCRIZIONE NON TROVATA"; box.className="result-box err"; } if(debugMode==="1" && data){ debug.style.display="block"; debug.textContent=JSON.stringify(data,null,2); } const back=document.createElement("button"); back.textContent="Torna indietro"; back.style.marginTop="20px"; back.onclick=()=>location.reload(); box.appendChild(back); box.style.display="block"; btn.disabled=false;}</script></body></html>
