<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Verifica Iscrizione</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.phone-wrapper{display:flex;gap:10px}.phone-prefix{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;background:#eee;width:90px;text-align:center;pointer-events:none;user-select:none}.phone-input{flex:1}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}.loader{margin-top:40px;display:none}.spinner{width:60px;height:60px;border:6px solid #ccc;border-top-color:#d40000;border-radius:50%;animation:spin .9s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}#popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup h2{margin-bottom:15px;font-size:24px}#popup.ok h2{color:#008000}#popup.err h2{color:#b30000}#popup button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}.hp-field{position:absolute;left:-9999px;opacity:0;pointer-events:none}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Verifica Iscrizione</h1><form onsubmit="event.preventDefault(); verifica();"><input id="nome" type="text" placeholder="Nome" maxlength="40"><input id="cognome" type="text" placeholder="Cognome" maxlength="40"><input id="email" type="email" placeholder="Email" maxlength="80"><div class="phone-wrapper"><div class="phone-prefix">+39</div><input id="telefono" class="phone-input" type="text" placeholder="Telefono" maxlength="15"></div><input id="hp1" class="hp-field" type="text" autocomplete="off"><input id="hp2" class="hp-field" type="text" autocomplete="off"><button id="btn" class="btn-main">Verifica</button></form><div id="loader" class="loader"><div class="spinner"></div></div></div><div id="popup-overlay"><div id="popup"></div></div><script>document.getElementById("logo-home").addEventListener("click",()=>{window.location.href="index.html"});function mostraPopup(testo, ok){ const overlay=document.getElementById("popup-overlay"); const popup=document.getElementById("popup"); popup.className=ok?"ok":"err"; popup.innerHTML="<h2>"+testo+"</h2><button>Chiudi</button>"; overlay.style.display="flex"; popup.querySelector("button").onclick=()=>location.reload(); overlay.onclick=()=>location.reload();}async function verifica(){ const params=new URLSearchParams(window.location.search); const token=params.get("id"); const nome=document.getElementById("nome").value.trim(); const cognome=document.getElementById("cognome").value.trim(); const email=document.getElementById("email").value.trim(); const telefono="+39"+document.getElementById("telefono").value.trim(); const hp1=document.getElementById("hp1").value; const hp2=document.getElementById("hp2").value; const btn=document.getElementById("btn"); const loader=document.getElementById("loader"); if(hp1!==""||hp2!==""){mostraPopup("Errore",false);return} if(!token){mostraPopup("Link non valido",false);return} btn.disabled=true; loader.style.display="block"; const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token,nome,cognome,email,telefono,hp1,hp2}) }); loader.style.display="none"; if(res.status===200){ mostraPopup("ISCRIZIONE TROVATA",true); } else { mostraPopup("ISCRIZIONE NON TROVATA",false); } btn.disabled=false;}</script></body></html>
