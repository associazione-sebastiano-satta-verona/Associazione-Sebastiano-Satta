<!DOCTYPE html><html lang="it"><head><meta name="theme-color" content="#d40000"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Verifica Iscrizione - Associazione Sardi Sebastiano Satta di Verona</title><style>body{ font-family:Arial,sans-serif; background:#fff; margin:0; padding:0; padding-top:80px; text-align:center;}.header{ display:flex; align-items:center; padding:12px 20px; background:linear-gradient(90deg,#d40000,#0044ff); color:#fff; position:fixed; top:0; left:0; width:100%; z-index:999; transition:backdrop-filter .3s ease,background .3s ease;}.header.scrolled{ backdrop-filter:blur(12px) brightness(1.35) saturate(160%); -webkit-backdrop-filter:blur(12px) brightness(1.35) saturate(160%); background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70));}.header img{ height:48px; width:48px; border-radius:50%; margin-right:15px; cursor:pointer;}.header-title{ font-size:20px; font-weight:700; white-space:normal; word-break:break-word; line-height:1.2; max-width:80%;}@media (max-width:380px){ .header-title{font-size:17px} .header img{width:40px;height:40px}}.result-box{ margin-top:40px; padding:30px; border-radius:12px; font-size:32px; font-weight:700; width:85%; max-width:600px; margin-left:auto; margin-right:auto;}.ok{ background:#d4ffd4; color:#008000; border:3px solid #008000;}.warn{ background:#fff4d4; color:#b36b00; border:3px solid #b36b00;}.err{ background:#ffd4d4; color:#b30000; border:3px solid #b30000;}</style></head><body><div class="header"><img id="logo-home" src="logo.png" alt="Logo Associazione dei Sardi Sebastiano Satta di Verona"><div class="header-title">Verifica Iscrizione</div></div><div id="result" class="result-box">Controllo in corso...</div><script>window.addEventListener("scroll",()=>{ const h=document.querySelector(".header"); window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});document.getElementById("logo-home").addEventListener("click",()=>{ window.location.href="index.html";});async function verifica(){ const params=new URLSearchParams(window.location.search); const token=params.get("id"); const box=document.getElementById("result"); if(!token || token.length!==256){ box.textContent="Codice non valido"; box.className="result-box err"; return; } try{ const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token}) }); const data=await res.json(); if(data.valido===true && data.usato===false){ box.textContent="ISCRIZIONE VALIDA"; box.className="result-box ok"; } else if(data.valido===true && data.usato===true){ box.textContent="INGRESSO GIÀ REGISTRATO"; box.className="result-box warn"; } else{ box.textContent="ISCRIZIONE NON TROVATA"; box.className="result-box err"; } }catch(e){ box.textContent="Errore di connessione"; box.className="result-box err"; }}verifica();</script></body></html>
