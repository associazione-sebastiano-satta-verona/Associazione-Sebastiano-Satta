>0</td><td id="tot-totale">0</td></tr></tfoot></table></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const startTime=Date.now();document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none";};async function caricaLista(){const params=new URLSearchParams(window.location.search);const key=params.get("key");const evento=params.get("id");if(!key||!evento)return;const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/get-iscrizioni",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,evento})});const lista=await res.json();const tbody=document.getElementById("tabella-body");tbody.innerHTML="";let totSoci=0, totNonSoci=0, totMinori=0, totPartecipanti=0;lista.forEach(r=>{const totaleRiga=r.soci+r.nonsoci+r.minori+r.partecipanti;const row=document.createElement("tr");row.innerHTML=`<td>${r.nome}</td><td>${r.cognome}</td><td>${r.soci}</td><td>${r.nonsoci}</td><td>${r.minori}</td><td>${r.partecipanti}</td><td>${totaleRiga}</td>`;tbody.appendChild(row);totSoci+=r.soci;totNonSoci+=r.nonsoci;totMinori+=r.minori;totPartecipanti+=r.partecipanti;});document.getElementById("tot-soci").textContent=totSoci;document.getElementById("tot-nonsoci").textContent=totNonSoci;document.getElementById("tot-minori").textContent=totMinori;document.getElementById("tot-partecipanti").textContent=totPartecipanti;document.getElementById("tot-totale").textContent=totSoci+totNonSoci+totMinori+totPartecipanti;document.getElementById("tabella-container").style.display="block";}document.addEventListener("DOMContentLoaded",caricaLista);document.getElementById("form").addEventListener("submit",async(e)=>{e.preventDefault();const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();const hp=document.getElementById("hp").value;const hp2=document.getElementById("hp2").value;if(hp!=="")return popupMsg("Errore di validazione.");if(hp2!=="")return popupMsg("Errore di validazione.");if(Date.now()-startTime<1200)return popupMsg("Errore di validazione.");const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/;if(!validName.test(nome))return popupMsg("Nome non valido.");if(!validName.test(cognome))return popupMsg("Cognome non valido.");const params=new URLSearchParams(window.location.search);const key=params.get("key");const evento=params.get("id");if(!key)return popupMsg("Chiave mancante.");if(!evento)return popupMsg("ID evento mancante.");document.getElementById("btn").disabled=true;const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,evento,nome,cognome})});if(res.status===200){popupMsg("Iscrizione trovata!");} else {popupMsg(await res.text());}document.getElementById("btn").disabled=false;});async function checkServerStatus() { const banner = document.getElementById("server-status"); let timeoutReached = false; const timeout = setTimeout(() => { timeoutReached = true; banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; }, 5000); try { const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-manutenzione"); if (timeoutReached) return; clearTimeout(timeout); if (!res.ok) { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; return; } const data = await res.json(); if (data.status === "maintenance") { banner.textContent = "⚠️ Sito in manutenzione"; banner.style.display = "block"; } } catch (e) { if (!timeoutReached) { clearTimeout(timeout); banner.textContent = "⚠️ Impossibile contattare il server"; banner.style.display = "block"; } }} checkServerStatus();</script><noscript><style> body { margin: 0; padding: 0; overflow: hidden !important; } #noscript-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(90deg, #d40000, #0044ff); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; text-align: center; color: #fff; font-family: Arial, sans-serif; z-index: 999999; } #noscript-overlay img { width: 120px; height: 120px; border-radius: 35%; margin-bottom: 25px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); } #noscript-overlay h1 { font-size: 26px; font-weight: 800; margin-bottom: 15px; } #noscript-overlay p { font-size: 18px; line-height: 1.5; max-width: 500px; }</style><div id="noscript-overlay"><img src="logo.png" alt="Logo Associazione Sardi Sebastiano Satta di Verona"><h1>JavaScript necessario</h1><p> Il sito dell'Associazione Sardi "Sebastiano Satta" di Verona ha bisogno di JavaScript abilitato sul dispositivo per funzionare correttamente.<br><br> Per favore, abilitalo nelle impostazioni del browser e ricarica la pagina. </p></div></noscript></body></html>
