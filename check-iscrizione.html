<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Verifica iscrizione</title><style> body{font-family:Arial,sans-serif;text-align:center;padding-top:60px;} .box{width:90%;max-width:450px;margin:auto;padding:20px;background:#f5f5f5;border-radius:10px;} input{width:90%;padding:12px;margin:8px 0;font-size:18px;border-radius:8px;border:2px solid #ccc;} .telefono-wrapper{display:flex;justify-content:center;gap:10px;} .prefisso{padding:12px 15px;background:#e6e6e6;border-radius:8px;border:2px solid #ccc;} button{padding:12px 25px;font-size:20px;font-weight:700;border:none;border-radius:10px;background:#d40000;color:white;cursor:pointer;} button:disabled{opacity:0.6;} .result{margin-top:25px;padding:20px;border-radius:10px;font-size:22px;font-weight:700;display:none;} .ok{background:#d4ffd4;color:#008000;border:3px solid #008000;} .err{background:#ffd4d4;color:#b30000;border:3px solid #b30000;} .loader{display:none;margin-top:20px;} .spinner{width:50px;height:50px;border:6px solid #ccc;border-top-color:#d40000;border-radius:50%;animation:spin .8s linear infinite;margin:auto;} @keyframes spin{to{transform:rotate(360deg);}} .hp-field{position:absolute;left:-9999px;opacity:0;pointer-events:none;} </style></head><body><div class="box" id="form"><h2>Verifica iscrizione</h2><input id="nome" type="text" placeholder="Nome" maxlength="40"><input id="cognome" type="text" placeholder="Cognome" maxlength="40"><input id="email" type="email" placeholder="Email" maxlength="80"><div class="telefono-wrapper"><div class="prefisso">+39</div><input id="telefono" type="text" placeholder="Telefono" maxlength="15" style="width:60%;"></div><input id="hp1" class="hp-field" type="text" autocomplete="off"><input id="hp2" class="hp-field" type="text" autocomplete="off"><button id="btn" onclick="verifica()">Verifica</button></div><div id="loader" class="loader"><div class="spinner"></div></div><div id="result" class="result"></div><script>async function verifica(){ const params = new URLSearchParams(window.location.search); const token = params.get("id"); const nome = document.getElementById("nome").value.trim(); const cognome = document.getElementById("cognome").value.trim(); const email = document.getElementById("email").value.trim(); const telefono = "+39" + document.getElementById("telefono").value.trim(); const hp1 = document.getElementById("hp1").value; const hp2 = document.getElementById("hp2").value; const btn = document.getElementById("btn"); const form = document.getElementById("form"); const loader = document.getElementById("loader"); const result = document.getElementById("result"); if(hp1 !== "" || hp2 !== ""){ form.style.display = "none"; result.textContent = "Errore"; result.className = "result err"; result.style.display = "block"; return; } if(!token){ form.style.display = "none"; result.textContent = "Link non valido"; result.className = "result err"; result.style.display = "block"; return; } if(nome.length < 2 || cognome.length < 2 || email.length < 5){ result.textContent = "Dati non validi"; result.className = "result err"; result.style.display = "block"; return; } btn.disabled = true; result.style.display = "none"; loader.style.display = "block"; const res = await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ token, nome, cognome, email, telefono, hp1, hp2 }) }); loader.style.display = "none"; if(res.status === 200){ result.textContent = "ISCRIZIONE TROVATA"; result.className = "result ok"; } else { result.textContent = "ISCRIZIONE NON TROVATA"; result.className = "result err"; } result.style.display = "block"; const backBtn = document.createElement("button"); backBtn.textContent = "Torna indietro"; backBtn.style.marginTop = "20px"; backBtn.onclick = () => location.reload(); result.appendChild(backBtn); btn.disabled = false;}</script></body></html>
