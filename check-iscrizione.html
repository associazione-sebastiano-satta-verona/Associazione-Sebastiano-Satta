<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#d40000"><title>Verifica Iscrizione - Associazione Sardi Sebastiano Satta di Verona</title><style>body{font-family:Arial,sans-serif;background:#fff;margin:0;padding:0;padding-top:80px}.header{display:flex;align-items:center;padding:12px 20px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;position:fixed;top:0;left:0;width:100%;z-index:999;transition:backdrop-filter .3s ease,background .3s ease}.header.scrolled{backdrop-filter:blur(12px) brightness(1.35) saturate(160%);background:linear-gradient(90deg,rgba(212,0,0,.70),rgba(0,68,255,.70))}.header img{height:48px;width:48px;border-radius:50%;margin-right:15px;cursor:pointer}.header-title{font-size:20px;font-weight:700;line-height:1.2;max-width:80%}.contenuto{max-width:600px;margin:auto;padding:20px}h1{text-align:center;font-size:30px;margin-bottom:20px}form{display:flex;flex-direction:column;gap:18px;margin-top:20px}input{padding:14px;font-size:17px;border-radius:10px;border:2px solid #ddd;transition:.2s}input:focus{border-color:#0044ff;outline:none}.btn-main{margin:25px auto 0 auto;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s,opacity .2s}.btn-main:hover{transform:translateY(-2px);opacity:.9}.btn-main:disabled{opacity:.6}#popup-msg-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:99999}#popup-msg{background:#fff;border-radius:14px;padding:25px;width:90%;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s ease;text-align:center;font-size:18px}#popup-msg button{margin-top:20px;padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(90deg,#d40000,#0044ff);color:#fff;font-size:17px;font-weight:700;cursor:pointer;width:100%}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}.hp-field{position:absolute;left:-9999px;opacity:0;pointer-events:none}.lista{margin-top:40px;padding:20px;border-radius:12px;background:#f5f5f5}.lista h2{text-align:center;margin-bottom:15px}.voce{padding:10px 0;border-bottom:1px solid #ccc;font-size:17px}</style></head><body><div class="header"><img id="logo-home" src="logo.png"><div class="header-title">Associazione dei Sardi "Sebastiano Satta" di Verona</div></div><div class="contenuto"><h1>Verifica Iscrizione</h1><form id="form"><input type="text" id="nome" placeholder="Nome" required><input type="text" id="cognome" placeholder="Cognome" required><input type="text" id="hp" class="hp-field"><input type="text" id="hp2" class="hp-field"><button type="submit" class="btn-main" id="btn">Verifica</button></form><div class="lista" id="lista" style="display:none"><h2>Lista Iscritti</h2><div id="lista-contenuto"></div></div></div><div id="popup-msg-bg"><div id="popup-msg"><p id="popup-msg-text"></p><button id="popup-msg-ok">OK</button></div></div><script>const startTime=Date.now();document.getElementById("logo-home").onclick=()=>{window.location.href="index.html"};window.addEventListener("scroll",()=>{const h=document.querySelector(".header");window.scrollY>10?h.classList.add("scrolled"):h.classList.remove("scrolled");});function popupMsg(t){document.getElementById("popup-msg-text").textContent=t;document.getElementById("popup-msg-bg").style.display="flex";}document.getElementById("popup-msg-ok").onclick=()=>{document.getElementById("popup-msg-bg").style.display="none";};async function caricaLista(){const params=new URLSearchParams(window.location.search);const token=params.get("token");const evento=params.get("id");if(!token||!evento)return;const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/lista-iscritti",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,evento})});if(res.status!==200)return;const lista=await res.json();const box=document.getElementById("lista-contenuto");box.innerHTML="";lista.forEach(i=>{const div=document.createElement("div");div.className="voce";div.textContent=i.nome+" "+i.cognome+" — "+i.data;box.appendChild(div);});document.getElementById("lista").style.display="block";}caricaLista();document.getElementById("form").addEventListener("submit",async(e)=>{e.preventDefault();const nome=document.getElementById("nome").value.trim();const cognome=document.getElementById("cognome").value.trim();const hp=document.getElementById("hp").value;const hp2=document.getElementById("hp2").value;if(hp!=="")return popupMsg("Errore di validazione.");if(hp2!=="")return popupMsg("Errore di validazione.");if(Date.now()-startTime<1200)return popupMsg("Errore di validazione.");const validName=/^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/;if(!validName.test(nome))return popupMsg("Nome non valido.");if(!validName.test(cognome))return popupMsg("Cognome non valido.");const params=new URLSearchParams(window.location.search);const token=params.get("token");const evento=params.get("id");if(!token)return popupMsg("Token mancante.");if(!evento)return popupMsg("ID evento mancante.");document.getElementById("btn").disabled=true;const res=await fetch("https://jfdqkbdqyrdqsxoippgy.supabase.co/functions/v1/check-iscrizione",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,evento,nome,cognome})});if(res.status===200){popupMsg("Iscrizione trovata!");} else {popupMsg(await res.text());}document.getElementById("btn").disabled=false;});</script></body></html>
